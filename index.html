<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jungle Tiers | Elite Console</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600;700&family=Inter:wght@400;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-gradient: linear-gradient(135deg, #a7f3d0 0%, #7dd3fc 100%);
            --card-bg: rgba(255, 255, 255, 0.95);
            --accent-aqua: #2dd4bf;
            --deep-aqua: #0891b2;
            --discord-blurple: #5865F2;
            --text-main: #1e293b;
            --text-dim: #64748b;
            --s-tier: #f43f5e;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background: var(--bg-gradient); background-attachment: fixed; color: var(--text-main); min-height: 100vh; padding-bottom: 50px; }
        h1, h2, h3, .logo, .btn, .rank-name { font-family: 'Fredoka', sans-serif; }

        nav {
            position: fixed; top: 0; width: 100%; height: 80px;
            background: rgba(255, 255, 255, 0.2); backdrop-filter: blur(12px);
            display: flex; justify-content: space-between; align-items: center;
            padding: 0 5%; z-index: 1000; border-bottom: 1px solid rgba(255,255,255,0.5);
        }
        .logo { font-size: 1.8rem; font-weight: 700; color: white; }
        .nav-links { display: flex; list-style: none; gap: 25px; align-items: center; }
        .nav-links a { text-decoration: none; color: white; font-weight: 700; cursor: pointer; }

        .btn { padding: 10px 20px; border-radius: 50px; border: none; font-weight: 700; cursor: pointer; transition: 0.3s; display: flex; align-items: center; gap: 8px; justify-content: center; }
        .btn-aqua { background: var(--accent-aqua); color: white; }
        .btn-white { background: white; color: var(--deep-aqua); border: 1px solid #e2e8f0; }
        .btn-save { background: #22c55e; color: white; padding: 15px 40px; font-size: 1.1rem; box-shadow: 0 10px 20px rgba(34, 197, 94, 0.3); }

        .main-content { max-width: 1100px; margin: 100px auto 40px; padding: 0 20px; }

        /* Admin Panel */
        #tier-panel { display: none; background: var(--card-bg); border-radius: 28px; padding: 40px; border: 2px solid white; box-shadow: 0 20px 50px rgba(0,0,0,0.1); margin-bottom: 40px; }
        
        .admin-controls { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 30px; }
        .control-box { background: #f8fafc; padding: 20px; border-radius: 20px; border: 1px solid #e2e8f0; }
        
        .input-group { margin-bottom: 15px; }
        .input-group label { display: block; font-size: 0.8rem; font-weight: 700; margin-bottom: 5px; color: var(--text-dim); }
        .input-group input, .input-group select { width: 100%; padding: 10px; border-radius: 10px; border: 1px solid #ddd; }

        /* Leaderboard Style */
        #public-leaderboard { background: var(--card-bg); border-radius: 28px; padding: 40px; margin-top: 40px; border: 2px solid white; }
        .player-row { display: flex; align-items: center; padding: 15px; background: white; border-radius: 15px; margin-bottom: 10px; border: 1px solid #f1f5f9; }
        .player-rank-img { width: 45px; height: 45px; object-fit: contain; margin-right: 15px; }
        .gm-icon { font-size: 1.2rem; color: var(--deep-aqua); margin-left: 10px; }

        #hero { text-align: center; padding: 60px 0; color: white; }
        #hero h1 { font-size: 3.5rem; margin-bottom: 20px; }

        .hidden { display: none; }
    </style>
</head>
<body>

    <nav>
        <div class="logo">JUNGLE<span>TIERS</span></div>
        <ul class="nav-links">
            <li><a onclick="location.reload()">HOME</a></li>
            <li><a href="#public-leaderboard">RANKINGS</a></li>
            <li><a onclick="showLogin()" style="background:white; color:var(--deep-aqua); padding:8px 15px; border-radius:50px;">ADMIN PANEL</a></li>
        </ul>
    </nav>

    <header id="hero">
        <h1>Master the Jungle.</h1>
        <div style="display:flex; gap:15px; justify-content:center;">
            <a href="#public-leaderboard" class="btn btn-white">View Leaderboard</a>
            <a href="https://discord.gg/RusKaP27b8" target="_blank" class="btn btn-aqua" style="background:#5865F2">Discord</a>
        </div>
    </header>

    <main class="main-content">
        
        <section id="tier-panel">
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:30px;">
                <h2 style="color:var(--deep-aqua)">Tier Management Console</h2>
                <button class="btn btn-save" onclick="saveToPublic()">SAVE ALL CHANGES</button>
            </div>

            <div class="admin-controls">
                <div class="control-box">
                    <h3>1. Create New Rank</h3>
                    <div class="input-group">
                        <label>Rank Name</label>
                        <input type="text" id="rankInputName" placeholder="e.g. Challenger">
                    </div>
                    <div class="input-group">
                        <label>Rank Image</label>
                        <input type="file" id="rankInputImg" accept="image/*">
                    </div>
                    <button class="btn btn-aqua" style="width:100%" onclick="addNewRank()">Create Rank Asset</button>
                </div>

                <div class="control-box">
                    <h3>2. Add New Player</h3>
                    <div class="input-group">
                        <label>Player Name</label>
                        <input type="text" id="playerInputName" placeholder="Enter name...">
                    </div>
                    <div class="input-group">
                        <label>Gamemode</label>
                        <select id="playerInputGM">
                            <option value="fa-gamepad">Controller 🎮</option>
                            <option value="fa-keyboard">Keyboard ⌨️</option>
                            <option value="fa-mobile-screen">Mobile 📱</option>
                        </select>
                    </div>
                    <button class="btn btn-white" style="width:100%" onclick="addNewPlayer()">Add Player to List</button>
                </div>
            </div>

            <table style="width:100%; border-collapse:collapse;">
                <thead style="background:#f1f5f9; text-align:left;">
                    <tr><th style="padding:10px;">Player</th><th style="padding:10px;">Gamemode</th><th style="padding:10px;">Assigned Rank</th><th style="padding:10px;">Actions</th></tr>
                </thead>
                <tbody id="adminTableBody"></tbody>
            </table>
        </section>

        <section id="public-leaderboard" class="hidden">
            <h2 style="text-align:center; margin-bottom:30px; color:var(--deep-aqua);">OFFICIAL JUNGLE RANKINGS</h2>
            <div id="leaderboardList"></div>
        </section>
    </main>

    <div id="loginModal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.7); z-index:9999; justify-content:center; align-items:center; backdrop-filter:blur(5px);">
        <div style="background:white; padding:40px; border-radius:20px; text-align:center;">
            <h3>Admin Credentials</h3>
            <input type="password" id="adminPass" placeholder="Password" style="margin:20px 0; padding:10px; width:100%; border-radius:10px; border:1px solid #ddd;">
            <button class="btn btn-aqua" style="width:100%" onclick="checkPass()">Login</button>
        </div>
    </div>

    <script>
        // System State
        let rankLibrary = JSON.parse(localStorage.getItem('rankLib')) || [];
        let playerList = JSON.parse(localStorage.getItem('playerList')) || [];

        // 1. Add Rank Logic
        function addNewRank() {
            const name = document.getElementById('rankInputName').value;
            const file = document.getElementById('rankInputImg').files[0];
            
            if(!name || !file) return alert("Please provide name and image!");

            const reader = new FileReader();
            reader.onload = function(e) {
                rankLibrary.push({ name: name, img: e.target.result });
                localStorage.setItem('rankLib', JSON.stringify(rankLibrary));
                alert("Rank Created!");
                document.getElementById('rankInputName').value = '';
                renderAdminTable();
            }
            reader.readAsDataURL(file);
        }

        // 2. Add Player Logic
        function addNewPlayer() {
            const name = document.getElementById('playerInputName').value;
            const gm = document.getElementById('playerInputGM').value;
            
            if(!name) return alert("Enter player name!");

            playerList.push({ 
                name: name, 
                gm: gm, 
                rankName: 'Unranked', 
                rankImg: 'https://via.placeholder.com/50' 
            });
            renderAdminTable();
            document.getElementById('playerInputName').value = '';
        }

        // 3. Render Admin Management
        function renderAdminTable() {
            const tbody = document.getElementById('adminTableBody');
            tbody.innerHTML = playerList.map((p, index) => `
                <tr style="border-bottom:1px solid #eee;">
                    <td style="padding:15px;"><strong>${p.name}</strong></td>
                    <td style="padding:15px;"><i class="fas ${p.gm}"></i></td>
                    <td style="padding:15px;">
                        <select onchange="updatePlayerRank(${index}, this.value)" style="padding:5px; border-radius:5px;">
                            <option>${p.rankName}</option>
                            ${rankLibrary.map(r => `<option value="${r.name}">${r.name}</option>`).join('')}
                        </select>
                    </td>
                    <td style="padding:15px;">
                        <button onclick="playerList.splice(${index},1); renderAdminTable();" style="color:red; background:none; border:none; cursor:pointer;">Remove</button>
                    </td>
                </tr>
            `).join('');
        }

        function updatePlayerRank(pIndex, rankName) {
            const rankObj = rankLibrary.find(r => r.name === rankName);
            if(rankObj) {
                playerList[pIndex].rankName = rankObj.name;
                playerList[pIndex].rankImg = rankObj.img;
            }
        }

        // 4. Save to Public
        function saveToPublic() {
            localStorage.setItem('playerList', JSON.stringify(playerList));
            renderPublicLeaderboard();
            alert("All changes are now LIVE on the Home page!");
        }

        function renderPublicLeaderboard() {
            const board = document.getElementById('leaderboardList');
            const section = document.getElementById('public-leaderboard');
            
            if(playerList.length > 0) {
                section.classList.remove('hidden');
                board.innerHTML = playerList.map(p => `
                    <div class="player-row">
                        <img src="${p.rankImg}" class="player-rank-img" onerror="this.src='https://via.placeholder.com/50'">
                        <div style="flex:1">
                            <h4 style="font-size:1.1rem;">${p.name} <i class="fas ${p.gm} gm-icon"></i></h4>
                            <span style="font-size:0.8rem; color:var(--deep-aqua); font-weight:700; text-transform:uppercase;">${p.rankName}</span>
                        </div>
                    </div>
                `).join('');
            }
        }

        // Auth
        function showLogin() { document.getElementById('loginModal').style.display = 'flex'; }
        function checkPass() {
            if(document.getElementById('adminPass').value === "krushnaxd123") {
                document.getElementById('loginModal').style.display = 'none';
                document.getElementById('tier-panel').style.display = 'block';
                renderAdminTable();
            } else { alert("Wrong Password"); }
        }

        // Initialize public view on load
        window.onload = renderPublicLeaderboard;
    </script>
</body>
</html>
