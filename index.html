<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jungle Tiers | Elite Management</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600;700&family=Inter:wght@400;500;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-gradient: linear-gradient(135deg, #a7f3d0 0%, #7dd3fc 100%);
            --card-bg: rgba(255, 255, 255, 0.95);
            --accent-aqua: #2dd4bf;
            --deep-aqua: #0891b2;
            --yt-red: #ff0000;
            --discord-blurple: #5865F2;
            --text-main: #1e293b;
            --text-dim: #64748b;
            --white: #ffffff;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background: var(--bg-gradient); background-attachment: fixed; min-height: 100vh; color: var(--text-main); }
        h1, h2, h3, .logo, .btn { font-family: 'Fredoka', sans-serif; }

        /* Navigation */
        nav {
            position: sticky; top: 0; width: 100%; height: 80px;
            background: rgba(255, 255, 255, 0.2); backdrop-filter: blur(15px);
            display: flex; justify-content: space-between; align-items: center;
            padding: 0 8%; z-index: 1000; border-bottom: 1px solid rgba(255,255,255,0.4);
        }
        .logo { font-size: 1.8rem; font-weight: 700; color: var(--white); }
        .logo span { color: var(--deep-aqua); }

        /* Hero */
        #hero { text-align: center; padding: 60px 20px 20px; color: white; }
        .hero-buttons { display: flex; gap: 15px; justify-content: center; margin-top: 20px; }
        .btn { padding: 12px 25px; border-radius: 50px; text-decoration: none; font-weight: 700; display: flex; align-items: center; gap: 8px; transition: 0.3s; border: none; cursor: pointer;}
        .btn-yt { background: white; color: var(--yt-red); }
        .btn-dc { background: var(--discord-blurple); color: white; }

        /* Admin Panel */
        .container { max-width: 1000px; margin: 20px auto; padding: 20px; }
        #admin-panel { display: none; background: var(--card-bg); border-radius: 24px; padding: 30px; box-shadow: 0 15px 35px rgba(0,0,0,0.1); margin-bottom: 40px; }
        
        .admin-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 30px; }
        .admin-box { background: #f8fafc; padding: 20px; border-radius: 15px; border: 1px solid #e2e8f0; }
        
        .upload-preview { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 10px; }
        .preview-item { position: relative; width: 60px; height: 60px; }
        .preview-item img { width: 100%; height: 100%; object-fit: contain; background: white; border-radius: 8px; border: 1px solid #ddd; }
        .remove-btn { position: absolute; -top: 5px; -right: 5px; background: red; color: white; border-radius: 50%; width: 18px; height: 18px; font-size: 10px; display: flex; align-items: center; justify-content: center; cursor: pointer; border: none; }

        input, select { width: 100%; padding: 10px; margin-top: 5px; border-radius: 8px; border: 1px solid #cbd5e1; }

        /* Public Leaderboard Card */
        .player-card {
            background: var(--card-bg); margin-bottom: 15px; border-radius: 20px;
            display: flex; align-items: center; padding: 20px 30px;
            border: 1px solid white; box-shadow: 0 8px 20px rgba(0,0,0,0.05);
        }
        .rank-img { width: 50px; height: 50px; object-fit: contain; margin-right: 20px; }
        .player-info { flex: 1; }
        .player-name { font-size: 1.4rem; font-weight: 700; color: var(--text-main); line-height: 1.2; }
        .player-rank-text { font-size: 0.85rem; font-weight: 700; color: var(--deep-aqua); text-transform: uppercase; }
        .gm-icons-row { display: flex; gap: 8px; margin-top: 5px; }
        .gm-small-icon { width: 22px; height: 22px; object-fit: contain; }

        #loginModal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); backdrop-filter: blur(10px); z-index: 2000; align-items: center; justify-content: center; }
    </style>
</head>
<body>

    <nav>
        <div class="logo">JUNGLE<span>TIERS</span></div>
        <div class="nav-links">
            <button onclick="showLogin()" style="background:white; color:var(--deep-aqua); border:none; padding:8px 20px; border-radius:50px; font-weight:700; cursor:pointer;">STAFF LOGIN</button>
        </div>
    </nav>

    <header id="hero">
        <h1>Master the Jungle.</h1>
        <div class="hero-buttons">
            <a href="https://www.youtube.com/channel/UC0vjAnsrzi7A_0HuF0JLEBg" target="_blank" class="btn btn-yt"><i class="fab fa-youtube"></i> YouTube</a>
            <a href="https://discord.gg/RusKaP27b8" target="_blank" class="btn btn-dc"><i class="fab fa-discord"></i> Discord</a>
        </div>
    </header>

    <main class="container">
        <section id="admin-panel">
            <h2 style="margin-bottom:20px; color:var(--deep-aqua)">Tier Management Console</h2>
            
            <div class="admin-grid">
                <div class="admin-box">
                    <h3>1. Upload Rank Icons</h3>
                    <input type="text" id="rankNameInput" placeholder="Rank Name (e.g. HT1)">
                    <input type="file" id="rankFileInput" accept="image/*" onchange="uploadAsset('rank')">
                    <div class="upload-preview" id="rankGallery"></div>
                </div>

                <div class="admin-box">
                    <h3>2. Upload Gamemode Icons</h3>
                    <input type="text" id="gmNameInput" placeholder="Mode Name (e.g. Sword)">
                    <input type="file" id="gmFileInput" accept="image/*" onchange="uploadAsset('gm')">
                    <div class="upload-preview" id="gmGallery"></div>
                </div>
            </div>

            <div class="admin-box" style="background: white;">
                <h3>3. Add Player to Home Page</h3>
                <div style="display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; margin-top:10px;">
                    <input type="text" id="playerName" placeholder="Username">
                    <select id="playerRankSelect"><option value="">Select Rank</option></select>
                    <select id="playerGMSelect"><option value="">Select Gamemode</option></select>
                </div>
                <button onclick="addPlayer()" class="btn" style="width:100%; background:var(--deep-aqua); color:white; margin-top:15px; justify-content:center;">PUBLISH PLAYER</button>
            </div>

            <div id="admin-player-list" style="margin-top:20px;"></div>
        </section>

        <div id="home-leaderboard"></div>
    </main>

    <div id="loginModal">
        <div style="background:white; padding:40px; border-radius:20px; text-align:center;">
            <h3>Admin Access</h3>
            <input type="password" id="passInput" placeholder="Password" style="margin:20px 0;">
            <button onclick="checkPass()" class="btn" style="background:var(--deep-aqua); color:white; width:100%; justify-content:center;">Unlock</button>
        </div>
    </div>

    <script>
        // Data Stores
        let ranks = JSON.parse(localStorage.getItem('jungle_ranks')) || [];
        let gms = JSON.parse(localStorage.getItem('jungle_gms')) || [];
        let players = JSON.parse(localStorage.getItem('jungle_players')) || [];

        // Asset Upload Logic
        function uploadAsset(type) {
            const nameInput = document.getElementById(type === 'rank' ? 'rankNameInput' : 'gmNameInput');
            const fileInput = document.getElementById(type === 'rank' ? 'rankFileInput' : 'gmFileInput');
            const file = fileInput.files[0];

            if (!nameInput.value || !file) return alert("Enter name and select file!");

            const reader = new FileReader();
            reader.onload = function(e) {
                const newItem = { id: Date.now(), name: nameInput.value, img: e.target.result };
                if (type === 'rank') ranks.push(newItem); else gms.push(newItem);
                
                saveData();
                renderAssets();
                nameInput.value = '';
                fileInput.value = '';
            };
            reader.readAsDataURL(file);
        }

        function removeAsset(type, id) {
            if (type === 'rank') ranks = ranks.filter(i => i.id !== id);
            else gms = gms.filter(i => i.id !== id);
            saveData();
            renderAssets();
        }

        function renderAssets() {
            const rGal = document.getElementById('rankGallery');
            const gGal = document.getElementById('gmGallery');
            const rSel = document.getElementById('playerRankSelect');
            const gSel = document.getElementById('playerGMSelect');

            rGal.innerHTML = ranks.map(r => `<div class="preview-item"><img src="${r.img}"><button class="remove-btn" onclick="removeAsset('rank', ${r.id})">×</button></div>`).join('');
            gGal.innerHTML = gms.map(g => `<div class="preview-item"><img src="${g.img}"><button class="remove-btn" onclick="removeAsset('gm', ${g.id})">×</button></div>`).join('');

            rSel.innerHTML = '<option value="">Select Rank</option>' + ranks.map(r => `<option value="${r.id}">${r.name}</option>`).join('');
            gSel.innerHTML = '<option value="">Select Gamemode</option>' + gms.map(g => `<option value="${g.id}">${g.name}</option>`).join('');
        }

        // Player Logic
        function addPlayer() {
            const name = document.getElementById('playerName').value;
            const rId = document.getElementById('playerRankSelect').value;
            const gId = document.getElementById('playerGMSelect').value;

            if (!name || !rId || !gId) return alert("Fill all fields!");

            const rankObj = ranks.find(r => r.id == rId);
            const gmObj = gms.find(g => g.id == gId);

            players.push({ id: Date.now(), name, rank: rankObj, gm: gmObj });
            saveData();
            renderPlayers();
            document.getElementById('playerName').value = '';
        }

        function removePlayer(id) {
            players = players.filter(p => p.id !== id);
            saveData();
            renderPlayers();
        }

        function renderPlayers() {
            const board = document.getElementById('home-leaderboard');
            const adminList = document.getElementById('admin-player-list');

            board.innerHTML = players.map(p => `
                <div class="player-card">
                    <img src="${p.rank.img}" class="rank-img">
                    <div class="player-info">
                        <div class="player-rank-text">${p.rank.name}</div>
                        <div class="player-name">${p.name}</div>
                        <div class="gm-icons-row">
                            <img src="${p.gm.img}" class="gm-small-icon" title="${p.gm.name}">
                        </div>
                    </div>
                </div>
            `).join('');

            adminList.innerHTML = players.map(p => `
                <div style="display:flex; justify-content:space-between; background:white; padding:10px; border-radius:10px; margin-bottom:5px; border:1px solid #ddd">
                    <span><b>${p.name}</b> (${p.rank.name})</span>
                    <button onclick="removePlayer(${p.id})" style="color:red; border:none; background:none; cursor:pointer;">Delete</button>
                </div>
            `).join('');
        }

        function saveData() {
            localStorage.setItem('jungle_ranks', JSON.stringify(ranks));
            localStorage.setItem('jungle_gms', JSON.stringify(gms));
            localStorage.setItem('jungle_players', JSON.stringify(players));
        }

        function showLogin() { document.getElementById('loginModal').style.display = 'flex'; }
        function checkPass() {
            if(document.getElementById('passInput').value === "krushnaxd123") {
                document.getElementById('loginModal').style.display = 'none';
                document.getElementById('admin-panel').style.display = 'block';
            } else { alert("Wrong password!"); }
        }

        // Init
        renderAssets();
        renderPlayers();
    </script>
</body>
</html>
