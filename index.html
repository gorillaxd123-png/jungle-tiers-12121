<!DOCTYPE html><html lang="en"><head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Jungle Tiers</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    body { 
        background: linear-gradient(135deg, #c3f7df 0%, #a2ccfe 100%); 
        color: #2d3436; 
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
        cursor: crosshair; 
        min-height: 100vh;
    }

    .navbar { 
        background: rgba(255, 255, 255, 0.7); 
        backdrop-filter: blur(12px);
        border-bottom: 1px solid rgba(0,0,0,0.05); 
        padding: 0 40px; 
        display: flex; 
        align-items: center; 
        justify-content: center; 
        gap: 15px; 
        height: 70px; 
        position: sticky; 
        top: 0; 
        z-index: 100; 
    }
    
    .nav-logo-text { 
        font-size: 26px;
        font-weight: 900;
        color: #1b5e20;
        margin-right: 20px;
        letter-spacing: -1px;
    }
    
    .nav-links { display: flex; gap: 10px; align-items: center; }
    .nav-links a { color: #4b5e50; text-decoration: none; font-size: 14px; font-weight: 700; padding: 8px 18px; border-radius: 12px; display: flex; align-items: center; gap: 8px; transition: all 0.2s ease; }
    .nav-links a:hover { background: rgba(255, 255, 255, 0.5); color: #000; }
    .nav-links a.active { background: #2e7d32; color: #fff; }

    /* Hero Section */
    .hero { text-align: center; padding: 120px 20px 80px; }
    .hero-badge { display: inline-block; background: #fff; border: 1px solid rgba(0,0,0,0.05); color: #2e7d32; font-size: 11px; padding: 7px 20px; border-radius: 50px; margin-bottom: 30px; letter-spacing: 2px; font-weight: 800; box-shadow: 0 4px 10px rgba(0,0,0,0.03); }
    .hero h1 { font-size: 90px; font-weight: 900; line-height: 0.9; margin-bottom: 25px; }
    .hero h1 .white { color: #1b5e20; display: block; }
    .hero h1 .glow { color: #388e3c; display: block; filter: drop-shadow(0 0 20px rgba(56,142,60,0.2)); }
    .hero p { color: #4a6352; font-size: 18px; margin-bottom: 45px; max-width: 550px; margin-left: auto; margin-right: auto; line-height: 1.7; }
    
    .btn-primary { background: #2e7d32; color: #fff; padding: 16px 35px; border-radius: 15px; font-weight: 800; text-decoration: none; display: inline-flex; align-items: center; gap: 10px; border: none; transition: 0.3s; box-shadow: 0 10px 20px rgba(46,125,50,0.2); }
    .btn-primary:hover { background: #1b5e20; transform: translateY(-3px); }
    .btn-secondary { background: #fff; color: #2e7d32; padding: 16px 35px; border-radius: 15px; font-weight: 800; text-decoration: none; display: inline-flex; align-items: center; gap: 10px; border: 1px solid #e0e0e0; transition: 0.3s; }
    .btn-secondary:hover { background: #f9f9f9; transform: translateY(-3px); }

    .rankings-page { display: none; padding-top: 30px; }
    .rankings-page.show { display: block; }
    .hero.hide { display: none; }

    /* Tabs Bar */
    .tabs-bar { display: flex; align-items: center; justify-content: space-between; padding: 15px 40px; background: rgba(255, 255, 255, 0.4); border-bottom: 1px solid rgba(0,0,0,0.05); }
    .tabs { display: flex; gap: 10px; }
    .tab { background: #fff; border: 1px solid rgba(0,0,0,0.05); color: #555; padding: 10px 20px; border-radius: 12px; cursor: pointer; font-size: 13px; font-weight: 800; transition: 0.2s; display: flex; align-items: center; gap: 10px; }
    .tab:hover { border-color: #2e7d32; color: #2e7d32; }
    .tab.active { background: #2e7d32; border-color: #2e7d32; color: #fff; }
    
    .search-wrap input { background: #fff; border: 1px solid rgba(0,0,0,0.05); padding: 12px 20px; border-radius: 12px; width: 260px; outline: none; }

    /* Tables */
    .table-wrap { padding: 40px; }
    table { width: 100%; border-collapse: separate; border-spacing: 0 8px; }
    thead th { padding: 15px; text-align: left; color: #7f8c8d; font-size: 11px; text-transform: uppercase; letter-spacing: 1px; }
    tbody tr { background: rgba(255,255,255,0.6); transition: 0.2s; border-radius: 15px; }
    tbody tr:hover { background: #fff; transform: scale(1.01); box-shadow: 0 5px 15px rgba(0,0,0,0.05); }
    td { padding: 20px 15px; }
    td:first-child { border-radius: 15px 0 0 15px; }
    td:last-child { border-radius: 0 15px 15px 0; }

    .points-cell { color: #2e7d32; font-weight: 900; font-size: 20px; }
    .tier-circle { width: 42px; height: 42px; border-radius: 12px; display: inline-flex; align-items: center; justify-content: center; font-weight: 900; font-size: 11px; margin-left: 5px; border: 1px solid rgba(0,0,0,0.05); }
    .tier-circle.ht { background: #ffebee; color: #c62828; }
    .tier-circle.lt { background: #e3f2fd; color: #1565c0; }

    /* Modal Styling */
    .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.4); backdrop-filter: blur(8px); z-index: 1000; align-items: center; justify-content: center; }
    .modal-overlay.show { display: flex; }
    .modal { background: #fff; padding: 40px; border-radius: 24px; width: 90%; max-width: 500px; box-shadow: 0 20px 40px rgba(0,0,0,0.1); }
    .modal h2 { margin-bottom: 20px; color: #1b5e20; }
  </style></head><body><nav class="navbar">
  <div class="nav-logo-text">Jungle Tiers</div>
  <div class="nav-links">
    <a href="https://discord.gg/RusKaP27b8" target="_blank">Discord</a>
    <a href="#" onclick="showPage('home')">Home</a>
    <a href="#" onclick="showPage('rankings')" class="active">Rankings</a>
  </div></nav><div class="hero" id="heroPage">
  <div class="hero-badge">● OFFICIAL LEADERBOARD</div>
  <h1>
    <span class="white">Jungle</span>
    <span class="glow">Tiers</span>
  </h1>
  <p>Dominate the arena across our specialized gamemodes. Climb the ranks and earn your title as the Jungle King.</p>
  <div class="hero-btns">
    <button class="btn-primary" onclick="showPage('rankings')">View Rankings</button>
    <a href="https://discord.gg/RusKaP27b8" target="_blank" class="btn-secondary">Join Discord</a>
  </div></div><div class="rankings-page" id="rankingsPage">
  <div class="tabs-bar">
    <div class="tabs">
      <div class="tab active" onclick="switchTab('overall', this)">OVERALL</div>
      <div class="tab" onclick="switchTab('Tank', this)">TANK</div>
    </div>
    <div class="search-wrap">
      <input type="text" id="searchInput" placeholder="Search Jungle warriors..." oninput="searchPlayer()">
    </div>
  </div>

  <div class="table-wrap">
    <table id="rankingsTable">
      <thead>
        <tr>
          <th># Rank</th>
          <th>Warrior</th>
          <th>Skill Points</th>
          <th>Region</th>
          <th style="text-align:right">Tiers</th>
        </tr>
      </thead>
      <tbody id="mainContent">
        </tbody>
    </table>
  </div></div><script>
  // Removed SMP, Dia SMP, and Dia Pot per request.
  const GAMEMODES = ['Tank'];
  
  let allPlayers = [
    { username: 'LanaRain', totalPoints: 520, region: 'EU', tiers: { Tank: 'HT1' } },
    { username: 'PvPMaster', totalPoints: 310, region: 'NA', tiers: { Tank: 'LT1' } },
    { username: 'JungleBeast', totalPoints: 140, region: 'AS', tiers: { Tank: 'LT2' } },
    { username: 'StoneWarrior', totalPoints: 45, region: 'AU', tiers: { Tank: 'LT3' } }
  ];

  let currentTab = 'overall';

  function getPlayerTitle(pts) {
      if (pts >= 400) return '👑 Jungle King';
      if (pts >= 250) return '💎 Crystal Baron';
      if (pts >= 100) return '⚔️ Warlord';
      if (pts >= 50) return '🏹 Hunter';
      return '🌱 Scout';
  }

  function showPage(page) {
    if (page === 'rankings') {
      document.getElementById('heroPage').classList.add('hide');
      document.getElementById('rankingsPage').classList.add('show');
      renderContent(allPlayers, currentTab);
    } else {
      document.getElementById('heroPage').classList.remove('hide');
      document.getElementById('rankingsPage').classList.remove('show');
    }
  }

  function renderContent(players, tab) {
    const content = document.getElementById('mainContent');
    let displayList = players;

    if (tab === 'overall') {
        displayList = [...players].sort((a,b) => b.totalPoints - a.totalPoints);
    } else {
        displayList = players.filter(p => p.tiers[tab]).sort((a,b) => {
            return a.tiers[tab].localeCompare(b.tiers[tab]);
        });
    }

    content.innerHTML = displayList.map((p, i) => {
        const tiersHtml = GAMEMODES.map(gm => {
            const t = p.tiers[gm];
            if (!t) return '';
            const cls = t.startsWith('HT') ? 'ht' : 'lt';
            return `<div class="tier-circle ${cls}" title="${gm}">${t}</div>`;
        }).join('');

        return `
          <tr>
            <td style="font-weight:900; color:#7f8c8d;">#${i+1}</td>
            <td>
                <div style="display:flex; align-items:center; gap:15px;">
                    <img src="https://mc-heads.net/avatar/${p.username}/40" style="border-radius:8px;">
                    <div>
                        <div style="font-weight:900; font-size:16px;">${p.username}</div>
                        <div style="font-size:12px; color:#2e7d32; font-weight:700;">${getPlayerTitle(p.totalPoints)}</div>
                    </div>
                </div>
            </td>
            <td><div class="points-cell">${tab === 'overall' ? p.totalPoints : p.tiers[tab]}</div></td>
            <td><span style="background:rgba(0,0,0,0.05); padding:5px 10px; border-radius:8px; font-size:11px; font-weight:800;">${p.region}</span></td>
            <td style="text-align:right">${tiersHtml}</td>
          </tr>
        `;
    }).join('');
  }

  function switchTab(tab, el) {
    currentTab = tab;
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    el.classList.add('active');
    renderContent(allPlayers, tab);
  }

  function searchPlayer() {
    const q = document.getElementById('searchInput').value.toLowerCase();
    const filtered = allPlayers.filter(p => p.username.toLowerCase().includes(q));
    renderContent(filtered, currentTab);
  }

  showPage('rankings');</script></body></html>
