<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jungle Tiers | MCTiers Style</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600;700&family=Inter:wght@400;500;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-dark: #0f172a;
            --card-bg: #1e293b;
            --accent-aqua: #2dd4bf;
            --deep-aqua: #0891b2;
            --text-main: #f8fafc;
            --text-dim: #94a3b8;
            /* MCTiers Inspired Colors */
            --tier-ht1: #ff4757;
            --tier-lt1: #ffa502;
            --tier-ht2: #eccc68;
            --tier-lt2: #7bed9f;
            --tier-ht3: #70a1ff;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background-color: var(--bg-dark); color: var(--text-main); min-height: 100vh; line-height: 1.6; }
        h1, h2, h3, .logo, .tier-label { font-family: 'Fredoka', sans-serif; }

        /* Navigation */
        nav {
            position: sticky; top: 0; width: 100%; height: 70px;
            background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(10px);
            display: flex; justify-content: space-between; align-items: center;
            padding: 0 8%; z-index: 1000; border-bottom: 1px solid rgba(255,255,255,0.05);
        }
        .logo { font-size: 1.5rem; font-weight: 700; color: var(--accent-aqua); letter-spacing: 1px; }
        .nav-links { display: flex; list-style: none; gap: 30px; }
        .nav-links a { text-decoration: none; color: var(--text-dim); font-weight: 500; transition: 0.3s; font-size: 0.9rem; cursor: pointer; }
        .nav-links a:hover { color: var(--accent-aqua); }

        /* Main Container */
        .container { max-width: 900px; margin: 40px auto; padding: 0 20px; }

        /* MCTiers Public Leaderboard */
        .leaderboard-header { text-align: center; margin-bottom: 40px; }
        .leaderboard-header h1 { font-size: 2.5rem; margin-bottom: 10px; }

        .player-card {
            background: var(--card-bg); margin-bottom: 8px; border-radius: 12px;
            display: flex; align-items: center; padding: 12px 20px;
            border: 1px solid rgba(255,255,255,0.05); transition: 0.2s;
        }
        .player-card:hover { transform: translateX(5px); border-color: var(--accent-aqua); }

        .tier-tag {
            width: 70px; text-align: center; padding: 4px 0; border-radius: 6px;
            font-weight: 700; font-size: 0.85rem; margin-right: 20px; color: #000;
        }

        .player-name { flex: 1; font-weight: 600; font-size: 1.1rem; }
        .gamemode-icon { color: var(--text-dim); font-size: 1.1rem; }

        /* Admin Panel */
        #admin-panel {
            display: none; background: #161e2e; padding: 30px; border-radius: 20px;
            border: 1px solid var(--accent-aqua); margin-bottom: 40px;
            animation: fadeIn 0.3s ease;
        }
        .form-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 15px; margin-top: 20px; }
        input, select { 
            background: #1f2937; border: 1px solid #374151; color: white; 
            padding: 10px; border-radius: 8px; outline: none; 
        }
        .btn-add { background: var(--accent-aqua); color: var(--bg-dark); border: none; padding: 10px; border-radius: 8px; font-weight: 700; cursor: pointer; }

        /* Modal */
        #loginModal {
            display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.85);
            z-index: 2000; align-items: center; justify-content: center;
        }
        .login-box { background: var(--card-bg); padding: 40px; border-radius: 20px; text-align: center; width: 320px; border: 1px solid #334155; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* Dynamic Tier Colors */
        .ht1 { background-color: var(--tier-ht1); }
        .lt1 { background-color: var(--tier-lt1); }
        .ht2 { background-color: var(--tier-ht2); }
        .lt2 { background-color: var(--tier-lt2); }
        .ht3 { background-color: var(--tier-ht3); }
    </style>
</head>
<body>

    <nav>
        <div class="logo">JUNGLE<span>TIERS</span></div>
        <ul class="nav-links">
            <li><a onclick="location.reload()">TIER LIST</a></li>
            <li><a href="https://discord.gg/RusKaP27b8" target="_blank">DISCORD</a></li>
            <li><a onclick="showLogin()" style="color: var(--accent-aqua)">ADMIN LOGIN</a></li>
        </ul>
    </nav>

    <div id="loginModal">
        <div class="login-box">
            <h2 style="margin-bottom: 20px;">Staff Access</h2>
            <input type="password" id="passInput" placeholder="Password" style="width: 100%; margin-bottom: 20px;">
            <button class="btn-add" style="width: 100%;" onclick="checkPass()">Unlock Panel</button>
        </div>
    </div>

    <div class="container">
        
        <section id="admin-panel">
            <h2 style="color: var(--accent-aqua)">Player Management</h2>
            <div class="form-grid">
                <input type="text" id="pName" placeholder="Minecraft Username">
                <select id="pTier">
                    <option value="ht1">HT1 (High Tier 1)</option>
                    <option value="lt1">LT1 (Low Tier 1)</option>
                    <option value="ht2">HT2 (High Tier 2)</option>
                    <option value="lt2">LT2 (Low Tier 2)</option>
                    <option value="ht3">HT3 (High Tier 3)</option>
                </select>
                <select id="pGM">
                    <option value="fa-fist-raised">Fist 👊</option>
                    <option value="fa-sword">Sword ⚔️</option>
                    <option value="fa-axe">Axe 🪓</option>
                    <option value="fa-bullseye">Crystal 💎</option>
                </select>
            </div>
            <button class="btn-add" style="width: 100%; margin-top: 15px;" onclick="addPlayer()">ADD PLAYER TO RANKINGS</button>
            
            <div id="admin-list" style="margin-top: 20px;">
                </div>
        </section>

        <div class="leaderboard-header">
            <h1>Official Ranking List</h1>
            <p style="color: var(--text-dim)">The most accurate jungle meta tier list.</p>
        </div>

        <div id="leaderboard-container">
            </div>

    </div>

    <script>
        let players = JSON.parse(localStorage.getItem('mctiers_players')) || [
            { name: "KrushnaXD", tier: "ht1", gm: "fa-sword" },
            { name: "JungleKing", tier: "lt1", gm: "fa-axe" }
        ];

        function showLogin() { document.getElementById('loginModal').style.display = 'flex'; }
        
        function checkPass() {
            if(document.getElementById('passInput').value === "krushnaxd123") {
                document.getElementById('loginModal').style.display = 'none';
                document.getElementById('admin-panel').style.display = 'block';
                renderAdminList();
            } else { alert("Incorrect Password"); }
        }

        function addPlayer() {
            const name = document.getElementById('pName').value;
            const tier = document.getElementById('pTier').value;
            const gm = document.getElementById('pGM').value;

            if(!name) return alert("Enter a name");

            players.push({ name, tier, gm });
            saveData();
            renderPublic();
            renderAdminList();
            document.getElementById('pName').value = '';
        }

        function removePlayer(index) {
            players.splice(index, 1);
            saveData();
            renderPublic();
            renderAdminList();
        }

        function saveData() {
            localStorage.setItem('mctiers_players', JSON.stringify(players));
        }

        function renderPublic() {
            const container = document.getElementById('leaderboard-container');
            // Sort by tier priority
            const order = { ht1: 1, lt1: 2, ht2: 3, lt2: 4, ht3: 5 };
            const sorted = [...players].sort((a, b) => order[a.tier] - order[b.tier]);

            container.innerHTML = sorted.map(p => `
                <div class="player-card">
                    <div class="tier-tag ${p.tier}">${p.tier.toUpperCase()}</div>
                    <div class="player-name">${p.name}</div>
                    <div class="gamemode-icon"><i class="fas ${p.gm}"></i></div>
                </div>
            `).join('');
        }

        function renderAdminList() {
            const list = document.getElementById('admin-list');
            list.innerHTML = players.map((p, i) => `
                <div style="display:flex; justify-content:space-between; background:#1f2937; padding:8px 15px; border-radius:5px; margin-bottom:5px; font-size:0.8rem;">
                    <span>${p.name} (${p.tier})</span>
                    <span onclick="removePlayer(${i})" style="color:#ff4757; cursor:pointer;">Delete</span>
                </div>
            `).join('');
        }

        // Initialize
        renderPublic();
    </script>
</body>
</html>
