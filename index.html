<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jungle Tiers | Aqua Edition</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600;700&family=Inter:wght@400;500;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-gradient: linear-gradient(135deg, #a7f3d0 0%, #7dd3fc 100%);
            --card-bg: rgba(255, 255, 255, 0.95);
            --accent-aqua: #2dd4bf;
            --deep-aqua: #0891b2;
            --yt-red: #ff0000;
            --discord-blurple: #5865F2;
            --text-main: #1e293b;
            --text-dim: #64748b;
            --white: #ffffff;
            
            /* Tier Colors */
            --ht1: #ef4444; --lt1: #f97316; --ht2: #eab308; --lt2: #22c55e; --ht3: #3b82f6;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background: var(--bg-gradient); background-attachment: fixed; color: var(--text-main); min-height: 100vh; }
        h1, h2, h3, .logo, .tier-tag, .btn { font-family: 'Fredoka', sans-serif; }

        /* Navigation */
        nav {
            position: sticky; top: 0; width: 100%; height: 80px;
            background: rgba(255, 255, 255, 0.2); backdrop-filter: blur(15px);
            display: flex; justify-content: space-between; align-items: center;
            padding: 0 8%; z-index: 1000; border-bottom: 1px solid rgba(255,255,255,0.4);
        }
        .logo { font-size: 1.8rem; font-weight: 700; color: var(--white); }
        .logo span { color: var(--deep-aqua); }
        .nav-links { display: flex; list-style: none; gap: 30px; }
        .nav-links a { text-decoration: none; color: var(--white); font-weight: 700; cursor: pointer; }

        /* Hero Section */
        #hero {
            height: 60vh; display: flex; flex-direction: column; justify-content: center;
            align-items: center; text-align: center; padding: 0 10%;
        }
        #hero h1 { font-size: clamp(2.5rem, 8vw, 4rem); color: var(--white); margin-bottom: 20px; text-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        
        .hero-buttons { display: flex; gap: 15px; flex-wrap: wrap; justify-content: center; }

        /* Buttons */
        .btn { 
            padding: 14px 28px; border-radius: 50px; cursor: pointer; border: none; 
            font-weight: 700; transition: 0.3s; text-decoration: none; display: flex; align-items: center; gap: 10px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1); font-size: 1rem;
        }
        .btn-yt { background: var(--white); color: var(--yt-red); }
        .btn-dc { background: var(--discord-blurple); color: var(--white); }
        .btn:hover { transform: translateY(-3px); box-shadow: 0 8px 20px rgba(0,0,0,0.15); opacity: 0.95; }

        /* Leaderboard */
        .container { max-width: 900px; margin: 0 auto 50px; padding: 0 20px; }
        .player-card {
            background: var(--card-bg); margin-bottom: 10px; border-radius: 16px;
            display: flex; align-items: center; padding: 15px 25px;
            border: 1px solid var(--white); box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }
        .tier-tag { width: 80px; text-align: center; padding: 6px 0; border-radius: 10px; font-weight: 700; color: white; margin-right: 25px; }

        /* Admin Styles */
        #admin-panel { display: none; background: var(--card-bg); padding: 30px; border-radius: 24px; border: 2px solid var(--white); margin-bottom: 40px; }
        .form-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; }
        input, select { padding: 12px; border-radius: 12px; border: 1px solid #ddd; outline: none; }
        
        #loginModal { display: none; position: fixed; inset: 0; background: rgba(8, 145, 178, 0.4); backdrop-filter: blur(10px); z-index: 2000; align-items: center; justify-content: center; }
        .login-box { background: var(--white); padding: 40px; border-radius: 24px; text-align: center; width: 320px; }

        /* Tier Colors */
        .ht1 { background: var(--ht1); } .lt1 { background: var(--lt1); } .ht2 { background: var(--ht2); } .lt2 { background: var(--lt2); } .ht3 { background: var(--ht3); }
    </style>
</head>
<body>

    <nav>
        <div class="logo">JUNGLE<span>TIERS</span></div>
        <ul class="nav-links">
            <li><a onclick="location.reload()">HOME</a></li>
            <li><a href="https://discord.gg/RusKaP27b8" target="_blank">DISCORD</a></li>
            <li><a onclick="showLogin()" style="background: var(--white); color: var(--deep-aqua); padding: 8px 20px; border-radius: 50px;">STAFF</a></li>
        </ul>
    </nav>

    <header id="hero">
        <h1>Master the Jungle.</h1>
        <div class="hero-buttons">
            <a href="https://www.youtube.com/channel/UC0vjAnsrzi7A_0HuF0JLEBg" target="_blank" class="btn btn-yt">
                <i class="fab fa-youtube"></i> YouTube
            </a>
            <a href="https://discord.gg/RusKaP27b8" target="_blank" class="btn btn-dc">
                <i class="fab fa-discord"></i> Discord
            </a>
        </div>
    </header>

    <div class="container">
        <section id="admin-panel">
            <h2 style="color: var(--deep-aqua); margin-bottom: 20px;">Admin Console</h2>
            <div class="form-grid">
                <input type="text" id="pName" placeholder="Username">
                <select id="pTier">
                    <option value="ht1">HT1</option><option value="lt1">LT1</option>
                    <option value="ht2">HT2</option><option value="lt2">LT2</option>
                    <option value="ht3">HT3</option>
                </select>
                <select id="pGM">
                    <option value="fa-sword">Sword</option><option value="fa-axe">Axe</option>
                    <option value="fa-gem">Crystal</option>
                </select>
            </div>
            <button onclick="addPlayer()" style="width:100%; margin-top:10px; padding:12px; background:var(--deep-aqua); color:white; border:none; border-radius:12px; font-weight:700; cursor:pointer;">Update Rankings</button>
            <div id="admin-list" style="margin-top:20px;"></div>
        </section>

        <div id="leaderboard-container"></div>
    </div>

    <div id="loginModal">
        <div class="login-box">
            <h3 style="color: var(--deep-aqua)">Staff Login</h3>
            <input type="password" id="passInput" placeholder="Password" style="width:100%; margin:20px 0; text-align:center;">
            <button onclick="checkPass()" style="width:100%; padding:10px; background:var(--deep-aqua); color:white; border:none; border-radius:10px; cursor:pointer;">Unlock</button>
        </div>
    </div>

    <script>
        let players = JSON.parse(localStorage.getItem('jungle_data')) || [
            { name: "KrushnaXD", tier: "ht1", gm: "fa-sword" }
        ];

        function showLogin() { document.getElementById('loginModal').style.display = 'flex'; }
        function checkPass() {
            if(document.getElementById('passInput').value === "krushnaxd123") {
                document.getElementById('loginModal').style.display = 'none';
                document.getElementById('admin-panel').style.display = 'block';
                render();
            } else { alert("Access Denied"); }
        }

        function addPlayer() {
            const name = document.getElementById('pName').value;
            const tier = document.getElementById('pTier').value;
            const gm = document.getElementById('pGM').value;
            if(name) {
                players.push({ name, tier, gm });
                save(); render();
                document.getElementById('pName').value = '';
            }
        }

        function removePlayer(i) { players.splice(i, 1); save(); render(); }
        function save() { localStorage.setItem('jungle_data', JSON.stringify(players)); }

        function render() {
            const container = document.getElementById('leaderboard-container');
            const order = { ht1: 1, lt1: 2, ht2: 3, lt2: 4, ht3: 5 };
            const sorted = [...players].sort((a, b) => order[a.tier] - order[b.tier]);

            container.innerHTML = sorted.map(p => `
                <div class="player-card">
                    <div class="tier-tag ${p.tier}">${p.tier.toUpperCase()}</div>
                    <div style="flex:1; font-weight:700;">${p.name}</div>
                    <div style="color:var(--deep-aqua)"><i class="fas ${p.gm}"></i></div>
                </div>
            `).join('');

            document.getElementById('admin-list').innerHTML = players.map((p, i) => `
                <div style="display:flex; justify-content:space-between; background:white; padding:8px; border-radius:8px; margin-bottom:5px;">
                    <span>${p.name}</span>
                    <button onclick="removePlayer(${i})" style="color:red; border:none; background:none; cursor:pointer;">Delete</button>
                </div>
            `).join('');
        }
        render();
    </script>
</body>
</html>
