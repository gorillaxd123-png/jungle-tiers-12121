<button onclick="openAdmin()" style="background:none; border:none; cursor:pointer; font-size:18px; margin-left:10px; opacity:0.5;">⚙️</button>

<div class="modal-overlay" id="adminModal">
  <div class="modal" style="max-width: 600px;">
    <button class="modal-close" onclick="document.getElementById('adminModal').classList.remove('show')">✕</button>
    <h2>🛡️ Admin Panel</h2>
    
    <div style="display:flex; gap:10px; margin-bottom:20px; border-bottom:1px solid #eee; padding-bottom:15px;">
        <button class="tab active" onclick="switchAdminTab('images')">Global Images</button>
        <button class="tab" onclick="switchAdminTab('players')">Manage Players</button>
    </div>

    <div id="admin-images">
        <p>Update any icon URL in the system:</p>
        <div id="image-controls" style="display:grid; grid-template-columns: 1fr 2fr; gap:10px; align-items:center;">
            </div>
    </div>

    <div id="admin-players" style="display:none;">
        <div style="display:flex; flex-direction:column; gap:10px;">
            <input type="text" id="new-username" placeholder="Minecraft Username" style="padding:8px; border-radius:5px; border:1px solid #ddd;">
            <input type="text" id="new-region" placeholder="Region (EU, NA, AS...)" style="padding:8px; border-radius:5px; border:1px solid #ddd;">
            <button class="btn-primary" onclick="addNewPlayer()">Add Player</button>
        </div>
        <hr style="margin:20px 0;">
        <div id="admin-player-list">
            </div>
    </div>
  </div>
</div>

<script>
  // ... Keep your existing allPlayers, GM_NAMES, etc. ...

  function openAdmin() {
    const pw = prompt("Enter Admin Password:");
    if (pw === "krushnaxd123") {
      document.getElementById('adminModal').classList.add('show');
      renderAdminImages();
      renderAdminPlayerList();
    } else {
      alert("Access Denied.");
    }
  }

  function switchAdminTab(tab) {
    document.getElementById('admin-images').style.display = tab === 'images' ? 'block' : 'none';
    document.getElementById('admin-players').style.display = tab === 'players' ? 'block' : 'none';
  }

  // --- Image System ---
  function renderAdminImages() {
    const container = document.getElementById('image-controls');
    container.innerHTML = '';
    
    // Create inputs for every icon in GM_ICONS
    for (const [key, url] of Object.entries(GM_ICONS)) {
      container.innerHTML += `
        <label style="font-size:12px; font-weight:bold;">${key}:</label>
        <input type="text" value="${url}" onchange="updateImage('${key}', this.value)" style="padding:5px; border:1px solid #ddd;">
      `;
    }
  }

  function updateImage(key, newUrl) {
    GM_ICONS[key] = newUrl;
    renderContent(allPlayers, currentTab); // Live update the UI
    alert(`${key} icon updated!`);
  }

  // --- Player System ---
  function addNewPlayer() {
    const user = document.getElementById('new-username').value;
    const reg = document.getElementById('new-region').value;
    
    if(!user) return alert("Enter a username");
    
    allPlayers.push({
      username: user,
      totalPoints: 0,
      region: reg,
      tiers: {}
    });
    
    renderAdminPlayerList();
    renderContent(allPlayers, currentTab);
    document.getElementById('new-username').value = '';
  }

  function deletePlayer(index) {
    if(confirm("Remove this player?")) {
      allPlayers.splice(index, 1);
      renderAdminPlayerList();
      renderContent(allPlayers, currentTab);
    }
  }

  function renderAdminPlayerList() {
    const list = document.getElementById('admin-player-list');
    list.innerHTML = allPlayers.map((p, i) => `
      <div style="display:flex; justify-content:space-between; padding:5px; border-bottom:1px solid #eee;">
        <span>${p.username}</span>
        <button onclick="deletePlayer(${i})" style="color:red; background:none; border:none; cursor:pointer;">Remove</button>
      </div>
    `).join('');
  }

  // Close profile modal fix
  function showProfile(username) {
    const p = allPlayers.find(pl => pl.username.toLowerCase() === username.toLowerCase());
    if (!p) return;
    const tiersHtml = Object.keys(GM_NAMES).map(gm => {
      const tier = p.tiers && p.tiers[gm] ? p.tiers[gm] : null;
      const cls = getTierClass(tier);
      return `<div class="profile-tier-card"><div class="gm-info"><img class="gm-icon" src="${GM_ICONS[gm]}"><span class="gm-name">${gm}</span></div><span class="tier-badge ${cls}">${tier || 'Unranked'}</span></div>`;
    }).join('');

    document.getElementById('profileContent').innerHTML = `
      <div class="profile-header">
        <img class="skin" src="https://mc-heads.net/body/${p.username}" onerror="this.src='https://mc-heads.net/body/Steve'">
        <div class="profile-info">
          <h2>${p.username}</h2>
          <div class="ptitle">${getPlayerTitle(p.totalPoints)}</div>
          <div class="ppts">Total points: <strong>${p.totalPoints || 0}</strong></div>
          <div class="pregion">Region: ${p.region || 'AS/AU'}</div>
        </div>
      </div>
      <div class="profile-tiers">${tiersHtml}</div>
    `;
    document.getElementById('profileModal').classList.add('show');
  }
</script>
