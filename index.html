<script>
  let allPlayers = [
    { username: 'LanaRain', totalPoints: 450, region: 'EU', tiers: { Sword: 'HT1', Crystal: 'LT2' } },
    { username: 'HypixelSteve', totalPoints: 280, region: 'NA', tiers: { Sword: 'LT1', Axe: 'HT2' } },
    { username: 'PvPGod', totalPoints: 110, region: 'AS', tiers: { Crystal: 'HT2', Mace: 'LT3' } },
    { username: 'RookieRick', totalPoints: 5, region: 'AU', tiers: { Sword: 'LT5' } },
    { username: 'NoobMaster', totalPoints: 0, region: 'NA', tiers: {} },
    { username: 'HunterHan', totalPoints: 65, region: 'EU', tiers: { Axe: 'LT1', UHC: 'HT4' } },
    { username: 'StoneLordSam', totalPoints: 15, region: 'AS', tiers: {} }
  ];
  
  let currentTab = 'overall';

  const GAMEMODES = ['Crystal', 'Sword', 'Mace', 'Neth Pot', 'Axe', 'UHC'];

  const GM_NAMES = {
    'Crystal': 'Crystal PvP',
    'Sword': 'Tank',
    'Mace': 'Mace PvP',
    'Neth Pot': 'Neth Pot PvP',
    'Axe': 'Axe PvP',
    'UHC': 'UHC PvP'
  };

  const GM_ICONS = {
    'Crystal': '/images/crystalztl.svg',
    'Sword': '/images/swordztl.svg',
    'Mace': '/images/maceztl.svg',
    'Neth Pot': '/images/nethpotztl.svg',
    'Axe': '/images/axepvpztl.svg',
    'UHC': '/images/uhcztl.svg'
  };

  const TIER_ORDER = ['HT1','LT1','HT2','LT2','HT3','LT3','HT4','LT4','HT5','LT5'];

  const DIVISION_ICONS = {
      '1': '🥇', '2': '🥈', '3': '🥉', '4': '🎗️', '5': '🏅'
  };

  function getPlayerTitle(pts) {
      if (pts >= 400) return '👑 Jungle Master';
      if (pts >= 250) return '💎 Crystal Baron';
      if (pts >= 100) return '⚔️ Warlord';
      if (pts >= 50) return '🏹 Hunter';
      if (pts >= 20) return '🛡️ Guardian';
      if (pts >= 10) return '🗿 Stone Lord';
      return '🌱 Scout';
  }

  function showPage(page) {
    if (page === 'rankings') {
      document.getElementById('heroPage').classList.add('hide');
      document.getElementById('rankingsPage').classList.add('show');
      renderContent(allPlayers, currentTab);
    } else {
      document.getElementById('heroPage').classList.remove('hide');
      document.getElementById('rankingsPage').classList.remove('show');
    }
  }

  function getTierClass(tier) {
    if (!tier) return 'unranked';
    return tier.startsWith('HT') ? 'ht' : 'lt';
  }

  function getRankBadge(i) {
    if (i === 0) return `<div class="rank-badge gold"><img src="/images/crownztl.png" onerror="this.src='/images/default.png'"></div>`;
    if (i === 1) return `<div class="rank-badge silver"><img src="/images/silvermedalztl1.png" onerror="this.src='/images/default.png'"></div>`;
    if (i === 2) return `<div class="rank-badge bronze"><img src="/images/bronzemedalztl.png" onerror="this.src='/images/default.png'"></div>`;
    return `<div class="rank-badge normal">${i + 1}</div>`;
  }

  function renderContent(players, tab) {
    const content = document.getElementById('mainContent');

    if (tab === 'overall') {
      const filtered = players.filter(p => p.totalPoints > 0).sort((a, b) => b.totalPoints - a.totalPoints);
      document.getElementById('playersCount').textContent = `${filtered.length} RANKED PLAYERS`;

      if (filtered.length === 0) {
        content.innerHTML = '<div class="no-results">No ranked players yet.</div>';
        return;
      }

      const tiersHtml = (p) => GAMEMODES.map(gm => {
        const tier = p.tiers && p.tiers[gm];
        if (!tier) return '';
        const cls = getTierClass(tier);
        return `<div class="tier-circle ${cls}">
          <img src="${GM_ICONS[gm]}" onerror="this.src='/images/default.png'">
          <div class="tier-label">${tier}</div>
        </div>`;
      }).join('');

      content.innerHTML = `
        <div class="table-wrap">
          <table>
            <thead><tr><th>#</th><th>Player</th><th>Points</th><th>Region</th><th style="text-align:right">Tiers</th></tr></thead>
            <tbody>
              ${filtered.map((p, i) => `
                <tr onclick="showProfile('${p.username}')">
                  <td class="rank-cell">${getRankBadge(i)}</td>
                  <td>
                    <div class="player-cell">
                      <img class="avatar" src="https://mc-heads.net/avatar/${p.username}/40" onerror="this.src='https://mc-heads.net/avatar/Steve/40'">
                      <div>
                        <div class="player-name">${p.username}</div>
                        <div class="player-title"><span>${getPlayerTitle(p.totalPoints)}</span></div>
                      </div>
                    </div>
                  </td>
                  <td><div class="points-cell">${p.totalPoints}</div><div class="points-label">POINTS</div></td>
                  <td><span class="region-badge">${p.region || 'AS/AU'}</span></td>
                  <td><div class="tiers-cell">${tiersHtml(p)}</div></td>
                </tr>`).join('')}
            </tbody>
          </table>
        </div>`;
    } else {
      const gmPlayers = players.filter(p => p.tiers && p.tiers[tab]);
      document.getElementById('playersCount').textContent = `${gmPlayers.length} RANKED PLAYERS`;

      const groups = {};
      TIER_ORDER.forEach(t => groups[t] = []);
      gmPlayers.forEach(p => { const t = p.tiers[tab]; if (groups[t]) groups[t].push(p); });

      const divisionsHtml = TIER_ORDER.map(tier => {
        const list = groups[tier];
        if (list.length === 0) return '';
        const isHT = tier.startsWith('HT');
        const cls = isHT ? 'ht' : 'lt';
        const num = tier.replace('HT','').replace('LT','');
        const label = isHT ? `High Tier ${num}` : `Low Tier ${num}`;
        const icon = DIVISION_ICONS[num] || '🏆';

        return `
          <div class="division-card">
            <div class="division-header ${cls}">
              <div class="division-title">
                <span class="icon">${icon}</span>
                <span class="tier-name ${cls}">${label}</span>
              </div>
              <span class="division-count">${list.length} players</span>
            </div>
            <div class="division-players">
              ${list.map(p => `
                <div class="division-player ${cls}-border" onclick="showProfile('${p.username}')">
                  <img class="avatar" src="https://mc-heads.net/avatar/${p.username}/32" onerror="this.src='https://mc-heads.net/avatar/Steve/32'">
                  <span class="pname">${p.username}</span>
                  <span class="pregion">${p.region || 'AS/AU'}</span>
                </div>`).join('')}
            </div>
          </div>`;
      }).join('');

      content.innerHTML = `
        <div class="gm-header">
          <div class="gm-icon-big">
            <img src="${GM_ICONS[tab]}" onerror="this.src='/images/default.png'">
          </div>
          <div>
            <h2>${GM_NAMES[tab]}</h2>
            <p>${gmPlayers.length} players across tiers</p>
          </div>
        </div>
        <div class="divisions-grid">${divisionsHtml || '<div class="no-results">No players ranked yet.</div>'}</div>`;
    }
  }

  function switchTab(tab, el) {
    currentTab = tab;
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    el.classList.add('active');
    renderContent(allPlayers, tab);
  }

  function searchPlayer() {
    const query = document.getElementById('searchInput').value.toLowerCase();
    const filtered = allPlayers.filter(p => p.username.toLowerCase().includes(query));
    renderContent(filtered, currentTab);
  }

  function showProfile(username) {
    const p = allPlayers.find(pl => pl.username.toLowerCase() === username.toLowerCase());
    if (!p) return;

    const tiersHtml = GAMEMODES.map(gm => {
      const tier = p.tiers && p.tiers[gm] ? p.tiers[gm] : null;
      const cls = getTierClass(tier);
      return `<div class="profile-tier-card">
        <div class="gm-info">
          <img class="gm-icon" src="${GM_ICONS[gm]}" onerror="this.src='/images/default.png'">
          <span class="gm-name">${gm}</span>
        </div>
        <span class="tier-badge ${cls}">${tier || 'Unranked'}</span>
      </div>`;
    }).join('');

    document.getElementById('profileContent').innerHTML = `
      <div class="profile-header">
        <img class="skin" src="https://mc-heads.net/body/${p.username}" onerror="this.src='https://mc-heads.net/body/Steve'">
        <div class="profile-info">
          <h2>${p.username}</h2>
          <div class="ptitle">${getPlayerTitle(p.totalPoints)}</div>
          <div class="ppts">Total points: <strong>${p.totalPoints || 0}</strong></div>
          <div class="ppts pregion">Region: ${p.region || 'AS/AU'}</div>
        </div>
      </div>
      <div class="profile-tiers">${tiersHtml}</div>`;
    document.getElementById('profileModal').classList.add('show');
  }

  document.querySelectorAll('.modal-overlay').forEach(overlay => {
    overlay.addEventListener('click', e => { if (e.target === overlay) overlay.classList.remove('show'); });
  });

  showPage('rankings');
</script>
